{% extends "base.html" %}

{% block title %}Admin Portal - Bank Control{% endblock %}

{% block content %}
<div class="flex min-h-screen items-center justify-center bg-gray-50 p-6">
    <div class="w-full max-w-sm space-y-8 animate-in fade-in duration-1000">
        <!-- Logo Section -->
        <div class="flex flex-col items-center">
            <div class="h-16 w-16 mb-4 flex items-center justify-center rounded-3xl bg-zinc-900 shadow-2xl shadow-zinc-900/20 ring-4 ring-white">
                <i data-lucide="landmark" class="w-8 h-8"></i>
            </div>
            <h2 class="text-2xl font-extrabold text-zinc-900">Branch Management</h2>
            <p class="text-xs font-bold text-gray-500 tracking-wider uppercase mt-1">Institutional Access Only</p>
        </div>

        <!-- Form Section -->
        <div class="bg-white border border-gray-100 rounded-[40px] p-10 shadow-2xl space-y-8">
            <form action="{{ url_for('admin_auth') }}" method="POST" class="space-y-6">
                <!-- Username -->
                <div class="space-y-2">
                    <label class="text-[10px] font-bold text-gray-400 uppercase tracking-widest px-2">Manager Username</label>
                    <div class="relative group">
                        <i data-lucide="user" class="w-5 h-5 absolute left-6 top-1/2 -translate-y-1/2 text-gray-400 group-focus-within:text-zinc-900 transition-colors"></i>
                        <input 
                            type="text" 
                            name="username" 
                            placeholder="admin"
                            required
                            class="w-full h-16 rounded-3xl bg-gray-50 border border-gray-100 pl-14 pr-4 font-bold text-zinc-900 outline-none focus:ring-4 focus:ring-zinc-500/10 focus:border-zinc-500 transition-all placeholder:text-gray-300"
                        >
                    </div>
                </div>

                <!-- Password -->
                <div class="space-y-2">
                    <label class="text-[10px] font-bold text-gray-400 uppercase tracking-widest px-2">Security Key</label>
                    <div class="relative group">
                        <i data-lucide="lock" class="w-5 h-5 absolute left-6 top-1/2 -translate-y-1/2 text-gray-400 group-focus-within:text-zinc-900 transition-colors"></i>
                        <input 
                            type="password" 
                            name="password" 
                            placeholder="••••••"
                            required
                            class="w-full h-16 rounded-3xl bg-gray-50 border border-gray-100 pl-14 pr-4 font-bold text-zinc-900 outline-none focus:ring-4 focus:ring-zinc-500/10 focus:border-zinc-500 transition-all placeholder:text-gray-300"
                        >
                    </div>
                </div>

                <div class="pt-4">
                    <button 
                        type="submit"
                        class="w-full h-16 rounded-3xl bg-zinc-900 hover:bg-zinc-800 text-white font-bold text-lg shadow-xl active:scale-95 transition-all flex items-center justify-center gap-3"
                    >
                        <span>Authenticate</span>
                        <i data-lucide="shield-key" class="w-6 h-6"></i>
                    </button>
                </div>
            </form>
        </div>

        <!-- Help Link -->
        <div class="text-center">
            <a href="{{ url_for('atm_card') }}" class="text-[10px] font-bold text-gray-600 hover:text-gray-400 uppercase tracking-widest transition-colors flex items-center justify-center gap-2">
                <i data-lucide="arrow-left" class="w-5 h-5"></i>
                Back to ATM
            </a>
        </div>
    </div>
</div>
{% endblock %}
