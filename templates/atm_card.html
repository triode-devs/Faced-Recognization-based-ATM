{% extends "base.html" %}

{% block title %}ATM Card Entry{% endblock %}

{% block content %}
<div class="flex min-h-screen items-center justify-center p-6 bg-[#09090b]">
    <div class="w-full max-w-sm space-y-8 animate-in fade-in duration-700">
        <!-- Logo/Icon Section -->
        <div class="flex flex-col items-center">
            <div class="h-16 w-16 mb-4 flex items-center justify-center rounded-3xl bg-blue-600 shadow-2xl shadow-blue-500/20 ring-4 ring-white/5">
                <i data-lucide="credit-card" class="w-8 h-8"></i>
            </div>
            <h2 class="text-2xl font-extrabold text-white">TrustPay ATM</h2>
            <p class="text-xs font-semibold text-gray-500 tracking-wider uppercase mt-1">Insert Card Number to Begin</p>
        </div>

        <!-- Form Section -->
        <div class="glass-card !bg-white/5 !border-white/5 rounded-[40px] p-8 shadow-2xl">
            <form action="{{ url_for('verify_card') }}" method="POST" class="space-y-6">
                <div class="space-y-2">
                    <label class="text-[10px] font-bold text-gray-400 uppercase tracking-widest px-2">16-Digit Card Number</label>
                    <div class="relative group">
                        <i data-lucide="credit-card" class="w-5 h-5 absolute left-6 top-1/2 -translate-y-1/2 text-gray-400 group-focus-within:text-blue-500 transition-colors"></i>
                        <input 
                            type="text" 
                            name="card_number" 
                            maxlength="19" 
                            placeholder="XXXX XXXX XXXX XXXX"
                            required
                            oninput="formatCard(this)"
                            class="w-full h-16 rounded-3xl bg-zinc-900 border border-white/5 pl-14 pr-4 text-xl font-bold text-white tracking-widest outline-none focus:ring-4 focus:ring-blue-500/20 focus:border-blue-500 transition-all placeholder:text-zinc-700"
                        >
                    </div>
                </div>

                <button 
                    type="submit"
                    class="group relative w-full h-16 rounded-3xl bg-white text-zinc-900 font-bold text-lg shadow-xl hover:bg-gray-100 active:scale-95 transition-all overflow-hidden"
                >
                    <div class="absolute inset-0 -translate-x-full bg-gradient-to-r from-transparent via-blue-500/10 to-transparent transition-transform duration-700 group-hover:translate-x-full"></div>
                    <div class="flex items-center justify-center gap-2">
                        <span>Continue to Scan</span>
                        <i data-lucide="chevron-right" class="w-5 h-5"></i>
                    </div>
                </button>
            </form>
        </div>

        <!-- Help Link -->
        <div class="text-center">
            <a href="{{ url_for('admin_login') }}" class="text-[10px] font-bold text-gray-600 hover:text-gray-400 uppercase tracking-widest transition-colors">
                Manager Access
            </a>
        </div>
    </div>
</div>

<script>
    function formatCard(input) {
        let value = input.value.replace(/\D/g, '');
        let formatted = '';
        for (let i = 0; i < value.length; i++) {
            if (i > 0 && i % 4 === 0) formatted += ' ';
            formatted += value[i];
        }
        input.value = formatted;
    }
</script>
{% endblock %}
