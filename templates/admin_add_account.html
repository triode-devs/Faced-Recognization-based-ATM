{% extends "base.html" %}

{% block title %}Create Account - Admin Portal{% endblock %}

{% block content %}
<div class="flex min-h-screen bg-gray-50 p-6 flex items-center justify-center">
    <div class="w-full max-w-md space-y-8 animate-in fade-in slide-in-from-bottom-10 duration-700">
        <!-- Header -->
        <div class="flex flex-col items-center">
            <div class="h-16 w-16 mb-4 flex items-center justify-center rounded-3xl bg-blue-600 shadow-2xl shadow-blue-500/30">
                <span class="iconify text-3xl text-white" data-icon="mdi:account-plus-outline"></span>
            </div>
            <h2 class="text-2xl font-extrabold text-zinc-900">New Beneficiary</h2>
            <p class="text-[10px] font-bold text-gray-400 uppercase tracking-widest mt-1">Enrollment Pipeline Step 1</p>
        </div>

        <div class="bg-white border border-gray-100 rounded-[40px] p-8 shadow-2xl space-y-8">
            <form action="{{ url_for('admin_add_account') }}" method="POST" class="space-y-6">
                <!-- Card Number -->
                <div class="space-y-2">
                    <label class="text-[10px] font-bold text-gray-400 uppercase tracking-widest px-2">Account Card Card Number</label>
                    <div class="relative group">
                        <span class="absolute left-6 top-1/2 -translate-y-1/2 iconify text-xl text-gray-400 group-focus-within:text-blue-500 transition-colors" data-icon="mdi:credit-card-chip-outline"></span>
                        <input 
                            type="text" 
                            name="card_number" 
                            maxlength="19"
                            required
                            oninput="formatCard(this)"
                            placeholder="XXXX XXXX XXXX XXXX"
                            class="w-full h-16 rounded-3xl bg-gray-50 border border-gray-100 pl-14 pr-4 font-bold text-zinc-900 outline-none focus:ring-4 focus:ring-blue-500/10 focus:border-blue-500 transition-all placeholder:text-gray-300"
                        >
                    </div>
                </div>

                <!-- Holder Name -->
                <div class="space-y-2">
                    <label class="text-[10px] font-bold text-gray-400 uppercase tracking-widest px-2">Full Legal Name</label>
                    <div class="relative group">
                        <span class="absolute left-6 top-1/2 -translate-y-1/2 iconify text-xl text-gray-400 group-focus-within:text-blue-500 transition-colors" data-icon="mdi:account-badge-outline"></span>
                        <input 
                            type="text" 
                            name="holder_name" 
                            required
                            placeholder="Ex: Sumithra S"
                            class="w-full h-16 rounded-3xl bg-gray-50 border border-gray-100 pl-14 pr-4 font-bold text-zinc-900 outline-none focus:ring-4 focus:ring-blue-500/10 focus:border-blue-500 transition-all placeholder:text-gray-300"
                        >
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div class="space-y-2">
                        <label class="text-[10px] font-bold text-gray-400 uppercase tracking-widest px-2">Phone</label>
                        <input type="text" name="phone" placeholder="+91 ..." class="w-full h-16 rounded-3xl bg-gray-50 border border-gray-100 px-6 font-bold text-zinc-900 outline-none focus:ring-4 focus:ring-blue-500/10 focus:border-blue-500 transition-all placeholder:text-gray-300">
                    </div>
                    <div class="space-y-2">
                        <label class="text-[10px] font-bold text-gray-400 uppercase tracking-widest px-2">Balance</label>
                        <input type="number" name="balance" value="5000" class="w-full h-16 rounded-3xl bg-gray-50 border border-gray-100 px-6 font-bold text-zinc-900 outline-none focus:ring-4 focus:ring-blue-500/10 focus:border-blue-500 transition-all placeholder:text-gray-300">
                    </div>
                </div>

                <div class="pt-4 flex gap-4">
                    <a href="{{ url_for('admin_dashboard') }}" class="h-16 w-16 rounded-3xl bg-gray-50 border border-gray-100 flex items-center justify-center text-gray-400 hover:text-zinc-900 transition-colors active:scale-95">
                        <span class="iconify text-xl" data-icon="mdi:close"></span>
                    </a>
                    <button 
                        type="submit"
                        class="flex-1 h-16 rounded-3xl bg-zinc-900 hover:bg-zinc-800 text-white font-bold text-lg shadow-xl active:scale-95 transition-all flex items-center justify-center gap-3"
                    >
                        <span>Create Account</span>
                        <span class="iconify text-2xl opacity-40" data-icon="mdi:chevron-right"></span>
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>

<script>
    function formatCard(input) {
        let value = input.value.replace(/\D/g, '');
        let formatted = '';
        for (let i = 0; i < value.length; i++) {
            if (i > 0 && i % 4 === 0) formatted += ' ';
            formatted += value[i];
        }
        input.value = formatted;
    }
</script>
{% endblock %}
