{% extends "base.html" %}

{% block title %}Face Identification{% endblock %}

{% block content %}
<div class="flex min-h-screen flex-col bg-[#09090b] text-white">
    <!-- Header -->
    <header class="p-6 flex items-center justify-between border-b border-white/5">
        <div class="flex items-center gap-3">
            <div class="h-10 w-10 rounded-xl bg-blue-600 flex items-center justify-center">
                <span class="iconify text-xl" data-icon="mdi:face-recognition"></span>
            </div>
            <div>
                <h1 class="text-sm font-bold">{{ account.holder_name }}</h1>
                <p class="text-[10px] text-gray-400 uppercase tracking-wider">Account ID: {{ account.card_number[-4:] }}</p>
            </div>
        </div>
        <a href="{{ url_for('logout') }}" class="h-10 w-10 rounded-xl bg-white/5 flex items-center justify-center text-gray-400 hover:text-white transition-colors">
            <span class="iconify text-xl" data-icon="mdi:logout"></span>
        </a>
    </header>

    <!-- Main Section -->
    <div class="flex-1 flex flex-col items-center justify-center p-6 space-y-8">
        <div class="text-center">
            <h2 class="text-2xl font-extrabold">Biometric Identity</h2>
            <p class="text-xs text-gray-500 mt-2">Position your face within the frame below</p>
        </div>

        <!-- Camera Container -->
        <div class="relative group">
            <div class="absolute -inset-1 bg-gradient-to-r from-blue-600 to-indigo-600 rounded-[40px] blur opacity-20 group-hover:opacity-40 transition duration-1000"></div>
            
            <div class="relative h-72 w-72 md:h-96 md:w-96 rounded-[40px] bg-zinc-900 border-4 border-white/5 overflow-hidden shadow-2xl">
                <video id="video" autoplay muted playsinline class="h-full w-full object-cover"></video>
                <canvas id="canvas" class="hidden"></canvas>
                
                <!-- Scanning UI Overlay -->
                <div id="scanning-overlay" class="absolute inset-0 pointer-events-none transition-opacity duration-300">
                    <!-- Corners -->
                    <div class="absolute top-8 left-8 h-8 w-8 border-t-4 border-l-4 border-blue-500"></div>
                    <div class="absolute top-8 right-8 h-8 w-8 border-t-4 border-r-4 border-blue-500"></div>
                    <div class="absolute bottom-8 left-8 h-8 w-8 border-b-4 border-l-4 border-blue-500"></div>
                    <div class="absolute bottom-8 right-8 h-8 w-8 border-b-4 border-r-4 border-blue-500"></div>
                    
                    <!-- Scan Line -->
                    <div id="scan-line" class="absolute left-0 right-0 h-1 bg-blue-500/50 shadow-[0_0_15px_rgba(59,130,246,0.5)] scan-line hidden"></div>
                </div>

                <!-- Status Overlay -->
                <div id="status-overlay" class="absolute bottom-0 inset-x-0 p-4 bg-zinc-900/90 text-center text-[10px] font-bold tracking-widest text-blue-400 uppercase border-t border-white/5">
                    Ready to Scan
                </div>
            </div>
        </div>

        <!-- Action Button -->
        <div class="w-full max-w-xs space-y-4">
            <button 
                id="scan-btn"
                onclick="captureImage()"
                class="w-full h-16 rounded-3xl bg-blue-600 hover:bg-blue-500 text-white font-bold text-lg shadow-xl shadow-blue-600/20 active:scale-95 transition-all flex items-center justify-center gap-3"
            >
                <span class="iconify text-2xl" data-icon="mdi:face-shimmer"></span>
                <span>Verify Identity</span>
            </button>
            <p id="retry-msg" class="text-center text-[10px] text-gray-600 uppercase font-bold tracking-widest hidden">
                System mismatch. Retrying in 3s...
            </p>
        </div>
    </div>
</div>

<script>
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const scanBtn = document.getElementById('scan-btn');
    const scanLine = document.getElementById('scan-line');
    const statusOverlay = document.getElementById('status-overlay');
    const retryMsg = document.getElementById('retry-msg');

    navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' } })
        .then(stream => {
            video.srcObject = stream;
        })
        .catch(err => {
            console.error("Camera access error:", err);
            statusOverlay.innerHTML = "<span class='text-red-500'>Camera Permission Denied</span>";
        });

    async function captureImage() {
        scanBtn.disabled = true;
        scanBtn.innerHTML = '<span class="iconify animate-spin" data-icon="mdi:loading"></span> Processing...';
        scanLine.classList.remove('hidden');
        statusOverlay.innerText = "Analyzing Features...";

        const context = canvas.getContext('2d');
        canvas.width = 640;
        canvas.height = 480;
        context.drawImage(video, 0, 0, 640, 480);
        
        const imageData = canvas.toDataURL('image/jpeg', 0.82);

        try {
            const response = await fetch('/api/verify-face', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ image: imageData })
            });
            const result = await response.json();

            if (result.status === 'success') {
                statusOverlay.innerHTML = `<span class="text-green-500">${result.message}</span>`;
                setTimeout(() => window.location.href = '/dashboard', 800);
            } else {
                statusOverlay.innerHTML = `<span class="text-red-500">${result.message}</span>`;
                if (result.status === 'locked') {
                    setTimeout(() => window.location.href = '/atm', 3000);
                } else {
                    scanBtn.disabled = false;
                    scanBtn.innerHTML = '<span class="iconify text-2xl" data-icon="mdi:face-shimmer"></span> <span>Try Again</span>';
                    scanLine.classList.add('hidden');
                }
            }
        } catch (err) {
            statusOverlay.innerText = "Connection Error";
            scanBtn.disabled = false;
        }
    }
</script>
{% endblock %}
